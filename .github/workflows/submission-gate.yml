name: Submission Gate

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: submission-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  metagraphed-submission-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request worktree
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          path: pr

      - name: Checkout trusted base worktree
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          path: trusted
          ref: ${{ github.event.pull_request.base.sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: trusted/package-lock.json

      - name: Install trusted dependencies
        working-directory: trusted
        run: npm ci

      - name: Capture changed files
        working-directory: pr
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
        run: |
          if [ -n "$BASE_SHA" ] && [ -n "$HEAD_SHA" ]; then
            git diff --name-only "$BASE_SHA" "$HEAD_SHA" > changed-files.txt
          else
            git fetch origin "$BASE_REF"
            git diff --name-only "origin/$BASE_REF"...HEAD > changed-files.txt
          fi

      - name: Classify submission route
        id: route
        working-directory: trusted
        run: node scripts/ci-validate-route.mjs --changed-files ../pr/changed-files.txt --out ../pr/submission-route.json

      - name: Run public submission preflight
        if: steps.route.outputs.mode == 'ugc'
        working-directory: trusted
        env:
          GITHUB_ACTOR: ${{ github.actor }}
        run: node scripts/submission-pr.mjs --changed-files ../pr/changed-files.txt --input-root ../pr --out ../pr/submission-report.json

      - name: Show public preflight report
        if: steps.route.outputs.mode == 'ugc'
        working-directory: trusted
        run: |
          node scripts/submission-comment.mjs --report ../pr/submission-report.json --out ../pr/submission-comment.md
          cat ../pr/submission-comment.md >> "$GITHUB_STEP_SUMMARY"

      - name: Skip normal PR
        if: steps.route.outputs.mode != 'ugc'
        run: |
          {
            echo "## Metagraphed Submission Gate"
            echo
            echo "No exact one-file UGC submission detected."
            echo
            echo "Normal backend, docs, data-refresh, and mixed maintenance PRs are ignored by the public submission gate."
          } >> "$GITHUB_STEP_SUMMARY"
